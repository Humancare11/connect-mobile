name: hello_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_dotenv: ^5.2.1
  flutter_stripe: ^13.0.0
  flutter_webrtc: ^1.0.0
  file_picker: ^10.3.2
  google_fonts: ^6.2.1
  google_sign_in: ^7.1.1
  http: ^1.2.1
  shared_preferences: ^2.2.2
  socket_io_client: ^2.0.3+1
  flutter_secure_storage: ^9.0.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
